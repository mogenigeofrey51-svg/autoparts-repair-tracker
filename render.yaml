services:
  - type: web
    name: autoparts-repair-tracker
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run db:generate && npm run db:deploy && npm run build
    startCommand: npm run start -w server
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
